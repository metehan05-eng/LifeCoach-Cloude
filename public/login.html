<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LifeCoach AI - Yapay Zeka Destekli Kişisel Yaşam Koçunuz. Hedeflerinizi belirleyin, alışkanlıklarınızı takip edin ve potansiyelinizi ortaya çıkarın.">
    <meta name="keywords" content="LifeCoach AI, Yapay Zeka Koç, Kişisel Gelişim, Hedef Takibi, Alışkanlık Takibi">
    <meta name="google-site-verification" content="GOOGLE_SEARCH_CONSOLE_VERIFICATION_CODE_HERE" />
    <title>Giriş — LifeCoach AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/lifecoach_ai_logo.svg">
    <link rel="apple-touch-icon" href="/lifecoach_ai_logo.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LifeCoach AI">
    <link rel="apple-touch-startup-image" href="/lifecoach_ai_logo.svg">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4F46E5">
    <meta name="msapplication-TileColor" content="#4F46E5">
    <meta name="msapplication-TileImage" content="/lifecoach_ai_logo.svg">
    <meta name="application-name" content="LifeCoach AI">
    <meta name="msapplication-starturl" content="/">
    <meta name="msapplication-navbutton-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered: ', registration.scope);
            })
            .catch((error) => {
              console.log('Service Worker registration failed: ', error);
            });
        });
      }
    </script>
    
    <!-- Add to Home Screen Prompt -->
    <script>
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show install button
        const installButton = document.createElement('button');
        installButton.innerHTML = 'Ana Ekrana Ekle <i class="fa-solid fa-download fa-xs ml-1"></i>';
        installButton.className = 'install-btn btn-submit fixed bottom-4 right-4 z-50 rounded-lg px-4 py-2 text-sm shadow-lg';
        installButton.style.display = 'none';
        
        document.body.appendChild(installButton);
        
        // Show button after 3 seconds
        setTimeout(() => {
          if (deferredPrompt) {
            installButton.style.display = 'block';
          }
        }, 3000);
        
        installButton.addEventListener('click', () => {
          installButton.style.display = 'none';
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            } else {
              console.log('User dismissed the install prompt');
            }
            deferredPrompt = null;
          });
        });
      });
      
      // Check if app is launched from home screen
      window.addEventListener('appinstalled', (evt) => {
        console.log('App was installed.');
        const installButton = document.querySelector('.install-btn');
        if (installButton) {
          installButton.style.display = 'none';
        }
      });
      
      // Check if launched from home screen
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('Launched in standalone mode');
        document.body.classList.add('standalone-mode');
      } else {
        console.log('Launched in browser');
      }
    </script>
    
    <style>
      .standalone-mode body { margin-top: 0 !important; }
      .standalone-mode .install-btn { display: none !important; }
      .standalone-mode .auth-card { margin-top: 0 !important; }
    </style>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050008;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        /* ===== AURORA DARK Background ===== */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(79, 70, 229, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(168, 85, 247, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 90%, rgba(236, 72, 153, 0.08) 0%, transparent 60%),
                #050008;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width: 550px; height: 550px; background: #4F46E5; top: -180px; left: -180px; animation-delay: 0s; }
        .orb-2 { width: 380px; height: 380px; background: #EC4899; bottom: -90px; right: -90px; animation-delay: -4s; }
        .orb-3 { width: 280px; height: 280px; background: #A855F7; top: 50%; left: 58%; animation-delay: -2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        /* Grid pattern overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(168, 85, 247, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Card */
        .auth-card {
            background: rgba(13, 11, 26, 0.88);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(168, 85, 247, 0.18);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(168, 85, 247, 0.07),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: card-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.5), rgba(236, 72, 153, 0.3), transparent);
        }

        /* Logo */
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4F46E5, #A855F7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.5), 0 8px 20px rgba(0,0,0,0.35);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.35), 0 8px 20px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.7), 0 0 90px rgba(79, 70, 229, 0.2), 0 8px 20px rgba(0,0,0,0.3); }
        }

        .auth-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #C084FC 60%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(148, 138, 180, 0.85);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }

        /* Form elements */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(192, 132, 252, 0.75);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(22, 15, 46, 0.65);
            border: 1px solid rgba(168, 85, 247, 0.14);
            border-radius: 14px;
            color: rgba(226, 232, 240, 0.95);
            padding: 12px 16px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(168, 85, 247, 0.45);
            background: rgba(22, 15, 46, 0.9);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.12);
        }

        .form-input::placeholder { color: rgba(100, 85, 140, 0.7); }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(148, 100, 200, 0.65);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .form-input.with-icon { padding-left: 40px; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #4F46E5, #A855F7);
            border: 1px solid rgba(168, 85, 247, 0.35);
            border-radius: 14px;
            color: white;
            padding: 13px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 25px rgba(79, 70, 229, 0.45);
            margin-top: 8px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(168, 85, 247, 0.6), 0 0 0 1px rgba(192, 132, 252, 0.35);
        }

        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        .btn-submit.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Error message */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.22);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.8rem;
            padding: 10px 14px;
            text-align: center;
            margin-bottom: 12px;
        }

        /* Links */
        .auth-link {
            color: #C084FC;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-link:hover { color: #EC4899; }

        .forgot-link {
            font-size: 0.8rem;
            color: rgba(148, 120, 190, 0.8);
            text-decoration: none;
            transition: color 0.2s;
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 16px;
        }

        .forgot-link:hover { color: #C084FC; }

        .auth-footer {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(148, 120, 190, 0.8);
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(168, 85, 247, 0.1);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(168, 85, 247, 0.12);
        }

        .divider-text {
            font-size: 0.75rem;
            color: rgba(148, 120, 190, 0.65);
        }

        /* Feature badges */
        .feature-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .feature-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid rgba(168, 85, 247, 0.16);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.7rem;
            color: rgba(192, 132, 252, 0.8);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.32); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.6); }

        /* Splash Screen Styles */
        #splash-screen { position: fixed; inset: 0; background: #050008; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease-out, visibility 0.6s; }
        .splash-logo { width: 80px; height: 80px; filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.6)); animation: splash-pulse 2s infinite ease-in-out; }
        @keyframes splash-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
        .splash-hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="/lifecoach_ai_logo.svg" alt="LifeCoach AI" class="splash-logo">
    </div>

    <div class="bg-mesh"></div>
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-card mx-4">
        <!-- Logo -->
        <div class="logo-icon">
            <img src="/lifecoach_ai_logo.svg" alt="LifeCoach AI" class="w-10 h-10 object-contain drop-shadow-md">
        </div>

        <h1 class="auth-title">Tekrar Hoş Geldiniz</h1>
        <p class="auth-subtitle">Kişisel gelişim yolculuğunuza devam edin.</p>

        <!-- Google Login (.env'deki GOOGLE_CLIENT_ID ile /api/config üzerinden yüklenir) -->
        <div class="mb-6">
            <div id="google-btn-container" style="min-height: 44px;"></div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">VEYA E-POSTA İLE</div>
            <div class="divider-line"></div>
        </div>

        <!-- Feature Badges -->
        <div class="feature-badges">
            <div class="feature-badge">
                <i class="fa-solid fa-bolt" style="font-size: 9px;"></i>
                Hızlı AI
            </div>
            <div class="feature-badge">
                <i class="fa-solid fa-lock" style="font-size: 9px;"></i>
                Şifreli
            </div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">E-posta Adresi</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" required class="form-input with-icon" placeholder="ornek@email.com">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Şifre</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" required class="form-input with-icon" placeholder="••••••••">
                </div>
            </div>

            <a href="/forgot-password" class="forgot-link">
                <i class="fa-solid fa-key" style="font-size: 10px; margin-right: 4px;"></i>
                Şifremi Unuttum
            </a>

            <div id="error-msg" class="error-msg hidden"></div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span id="btn-text">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i>
                    Giriş Yap
                </span>
            </button>
        </form>

        <div class="auth-footer">
            Hesabınız yok mu?
            <a href="/signup" class="auth-link ml-1">Ücretsiz Kaydolun →</a>
        </div>
    </div>

    <script>
        // Google Auth Handler
        async function handleCredentialResponse(response) {
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });
                
                const data = await res.json();

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || "Google girişi başarısız.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Google Client ID .env'den /api/config ile alınır
        async function initGoogleSignIn() {
            try {
                const res = await fetch('/api/config');
                const { googleClientId } = await res.json();
                if (!googleClientId) return;

                function renderWhenReady() {
                    if (window.google?.accounts?.id) {
                        window.google.accounts.id.initialize({
                            client_id: googleClientId,
                            callback: handleCredentialResponse,
                            auto_prompt: false
                        });
                        const el = document.getElementById('google-btn-container');
                        if (el) window.google.accounts.id.renderButton(el, { type: 'standard', size: 'large', theme: 'filled_black', text: 'sign_in_with', shape: 'rectangular', width: el.offsetWidth || 320 });
                        return;
                    }
                    setTimeout(renderWhenReady, 100);
                }
                renderWhenReady();
            } catch (e) {
                console.warn('Google Sign-In config yüklenemedi:', e);
            }
        }

        // Splash Screen Logic
        window.addEventListener('load', () => {
            initGoogleSignIn();
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('splash-hidden');
            }, 800);
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            errorMsg.classList.add('hidden');
            submitBtn.classList.add('loading');
            btnText.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Giriş yapılıyor...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();

                if (data.token) {
                    btnText.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Başarılı!';
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.remove('hidden');
                    submitBtn.classList.remove('loading');
                    btnText.innerHTML = '<i class="fa-solid fa-right-to-bracket mr-2"></i> Giriş Yap';
                }
            } catch (err) {
                errorMsg.textContent = "Bir bağlantı hatası oluştu. Lütfen tekrar deneyin.";
                errorMsg.classList.remove('hidden');
                submitBtn.classList.remove('loading');
                btnText.innerHTML = '<i class="fa-solid fa-right-to-bracket mr-2"></i> Giriş Yap';
            }
        });
    </script>
</body>
</html>
