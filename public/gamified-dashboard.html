<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeCoach AI - İlerleme</title>
    
    <!-- Google Fonts: Nunito is very round and friendly like Duolingo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            green: '#58cc02',
                            'green-hover': '#46a302',
                            'green-shadow': '#58a700',
                            blue: '#1cb0f6',
                            'blue-hover': '#148dd0',
                            'blue-shadow': '#1899d6',
                            red: '#ff4b4b',
                            'red-shadow': '#ea2b2b',
                            purple: '#ce82ff',
                            'purple-shadow': '#a559ce',
                            yellow: '#ffc800',
                            'yellow-shadow': '#d3a600',
                            gray: '#e5e5e5',
                            'gray-shadow': '#cecece',
                            dark: '#4b4b4b',
                            bg: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.brand.bg');
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3D Button Styles */
        .btn-3d {
            transition: all 0.15s ease;
            position: relative;
            transform: translateY(0);
        }
        
        .btn-3d:active {
            transform: translateY(4px);
        }

        .btn-green {
            background-color: theme('colors.brand.green');
            border-bottom: 4px solid theme('colors.brand.green-shadow');
            color: white;
        }
        .btn-green:active {
            border-bottom-width: 0px;
            margin-top: 4px;
        }

        /* Gamified Path Nodes */
        .path-container {
            position: relative;
            padding: 40px 0 120px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .node-wrapper {
            position: relative;
            z-index: 10;
        }

        /* Staggered positioning for the path */
        .node-wrapper:nth-child(even) {
            transform: translateX(40px);
        }
        .node-wrapper:nth-child(odd) {
            transform: translateX(-40px);
        }
        .node-wrapper:nth-child(3n) {
            transform: translateX(-60px);
        }
        .node-wrapper:nth-child(4n) {
            transform: translateX(60px);
        }

        .path-node {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            position: relative;
        }

        /* Inner detail for node */
        .path-node::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 10%;
            width: 80%;
            height: 25%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            pointer-events: none;
        }

        .node-green {
            background-color: theme('colors.brand.green');
            box-shadow: 0 6px 0 theme('colors.brand.green-shadow');
            color: white;
        }
        .node-green:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 theme('colors.brand.green-shadow');
        }

        .node-gray {
            background-color: theme('colors.brand.gray');
            box-shadow: 0 6px 0 theme('colors.brand.gray-shadow');
            color: #afafaf;
        }

        .node-purple {
            background-color: theme('colors.brand.purple');
            box-shadow: 0 6px 0 theme('colors.brand.purple-shadow');
            color: white;
        }
        .node-purple:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 theme('colors.brand.purple-shadow');
        }

        .node-active-ring {
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -18px;
            border: 4px solid theme('colors.brand.gray');
            border-radius: 50%;
            z-index: -1;
            border-top-color: theme('colors.brand.yellow');
            border-right-color: theme('colors.brand.yellow');
            transform: rotate(-45deg);
        }

        /* Unit Header */
        .unit-header {
            background-color: theme('colors.brand.green');
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            width: 90%;
            max-width: 400px;
            margin: 20px auto 30px auto;
            position: relative;
        }
        .unit-header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0 15px;
            border-style: solid;
            border-color: theme('colors.brand.green') transparent transparent transparent;
        }

        /* SVG Path Line */
        #path-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Bottom Nav */
        .bottom-nav {
            background: white;
            border-top: 2px solid theme('colors.brand.gray');
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #afafaf;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .nav-item.active {
            color: theme('colors.brand.blue');
            border: 2px solid theme('colors.brand.blue-shadow');
            background-color: rgba(28, 176, 246, 0.1);
        }
        .nav-item img {
            width: 32px;
            height: 32px;
            opacity: 0.5;
        }
        .nav-item.active img {
            opacity: 1;
        }

        /* Top Bar */
        .top-bar {
            background: white;
            border-bottom: 2px solid theme('colors.brand.gray');
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            padding-top: max(12px, env(safe-area-inset-top));
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 16px;
        }
        .stat-fire { color: theme('colors.brand.red'); }
        .stat-gem { color: theme('colors.brand.blue'); }
        .stat-heart { color: theme('colors.brand.red'); }
    </style>
</head>
<body class="font-sans text-brand-dark pt-[70px]">

    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="stat-badge text-gray-400">
            <i class="fa-solid fa-flag text-xl"></i>
        </div>
        <div class="stat-badge stat-fire">
            <i class="fa-solid fa-fire text-xl"></i>
            <span>12</span>
        </div>
        <div class="stat-badge stat-gem">
            <i class="fa-regular fa-gem text-xl"></i>
            <span>3.5k</span>
        </div>
        <div class="stat-badge stat-heart">
            <i class="fa-solid fa-heart text-xl"></i>
            <span>5</span>
        </div>
    </header>

    <main class="min-h-screen relative pb-24">
        <!-- Unit Header -->
        <div class="unit-header text-center shadow-lg">
            <h2 class="text-xl font-bold uppercase track-wider opacity-90 mb-1">2. KISIM, 18. ÜNİTE</h2>
            <h1 class="text-2xl font-extrabold pb-2">Hayatı Düzenle & Motive Ol</h1>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 border-2 border-white/30 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-book-open text-white"></i>
            </div>
        </div>

        <!-- Path Container -->
        <div class="path-container" id="path">
            <!-- Background Line -->
            <svg id="path-line">
                <path id="svg-path" fill="none" stroke="#e5e5e5" stroke-width="15" stroke-linecap="round"></path>
            </svg>

            <!-- Node 1: Completed -->
            <div class="node-wrapper">
                <div class="path-node node-green">
                    <i class="fa-solid fa-star"></i>
                </div>
            </div>

            <!-- Node 2: Completed -->
            <div class="node-wrapper">
                <div class="path-node node-green">
                    <i class="fa-solid fa-book"></i>
                </div>
            </div>

            <!-- Node 3: Completed -->
            <div class="node-wrapper">
                <div class="path-node node-green">
                    <i class="fa-solid fa-headphones"></i>
                </div>
            </div>

            <!-- Node 4: Active (Next to do) -->
            <div class="node-wrapper">
                <div class="path-node node-green">
                    <div class="node-active-ring"></div>
                    <!-- Tooltip for active -->
                    <div class="absolute -top-14 bg-white border-2 border-gray-200 rounded-xl px-4 py-2 font-bold text-gray-700 whitespace-nowrap shadow-sm before:content-[''] before:absolute before:-bottom-2 before:left-1/2 before:-translate-x-1/2 before:border-l-8 before:border-r-8 before:border-t-8 before:border-transparent before:border-t-gray-200">
                        BAŞLA
                    </div>
                    <i class="fa-solid fa-video"></i>
                </div>
            </div>

            <!-- Node 5: Locked -->
            <div class="node-wrapper">
                <div class="path-node node-gray">
                    <i class="fa-solid fa-dumbbell"></i>
                </div>
            </div>

            <!-- Treasure Chest Node -->
            <div class="node-wrapper">
                <div class="w-16 h-16 bg-gray-300 rounded-xl flex items-center justify-center shadow-[0_6px_0_#cecece]">
                    <i class="fa-solid fa-box-open text-3xl text-gray-400"></i>
                </div>
            </div>

            <!-- Node 6: Locked -->
            <div class="node-wrapper">
                <div class="path-node node-gray">
                    <i class="fa-solid fa-compass"></i>
                </div>
            </div>
            
             <!-- Node 7: Boss/AI Session -->
             <div class="node-wrapper mt-4">
                <div class="path-node node-purple w-20 h-20 text-4xl">
                    <i class="fa-solid fa-robot"></i>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active">
            <i class="fa-solid fa-house text-2xl"></i>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-bullseye text-2xl"></i>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-shield-halved text-2xl"></i>
        </div>
        <div class="nav-item">
            <i class="fa-solid fa-user text-2xl"></i>
        </div>
        <div class="nav-item relative">
            <i class="fa-solid fa-bell text-2xl"></i>
            <div class="absolute top-1 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
        </div>
    </nav>

    <script>
        // Simple script to draw the connecting line between nodes
        function drawPathLine() {
            const pathSvg = document.getElementById('path-line');
            const pathLine = document.getElementById('svg-path');
            const nodes = document.querySelectorAll('.node-wrapper');
            const container = document.getElementById('path');
            
            if (!nodes.length) return;

            // Set SVG dimensions
            const containerRect = container.getBoundingClientRect();
            pathSvg.setAttribute('width', containerRect.width);
            pathSvg.setAttribute('height', containerRect.height);

            let d = '';
            
            nodes.forEach((node, index) => {
                // Get center of each node relative to container
                const nodeRect = node.getBoundingClientRect();
                const x = nodeRect.left - containerRect.left + nodeRect.width / 2;
                const y = nodeRect.top - containerRect.top + nodeRect.height / 2;
                
                if (index === 0) {
                    d += `M ${x} ${y} `;
                } else {
                    // Quick and dirty curve: calculate control points
                    const prevNodeRect = nodes[index-1].getBoundingClientRect();
                    const prevX = prevNodeRect.left - containerRect.left + prevNodeRect.width / 2;
                    const prevY = prevNodeRect.top - containerRect.top + prevNodeRect.height / 2;
                    
                    const midY = (y + prevY) / 2;
                    // Draw cubic bezier curve for a wavy look
                    d += `S ${x} ${midY}, ${x} ${y} `;
                }
            });
            
            pathLine.setAttribute('d', d);
        }

        // Draw initial path and on resize
        window.addEventListener('load', drawPathLine);
        window.addEventListener('resize', drawPathLine);
    </script>
</body>
</html>
