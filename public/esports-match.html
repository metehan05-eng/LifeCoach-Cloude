<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Match - Esports Arena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background: #131f24;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        body.match-won {
            background: #131f24;
            box-shadow: inset 0 0 100px rgba(88, 204, 2, 0.2);
        }

        body.match-lost {
            background: #131f24;
            box-shadow: inset 0 0 100px rgba(234, 43, 43, 0.2);
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        /* Match Header */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .match-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .match-status-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .match-status-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .leaderboard-position {
            font-size: 0.9rem;
            color: #00d4ff;
            font-weight: 600;
        }

        /* Main Match Arena */
        .match-arena {
            display: grid;
            grid-template-columns: 1fr 200px 1fr;
            gap: 20px;
            margin-bottom: 25px;
            align-items: stretch;
        }

        /* Player Card */
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .player-card.player-side {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(0, 212, 255, 0.05);
        }

        .player-card.player-side.winning {
            background: rgba(76, 206, 71, 0.15);
            border-color: rgba(76, 206, 71, 0.6);
            box-shadow: 0 0 30px rgba(76, 206, 71, 0.3);
        }

        .player-card.opponent-side {
            border-color: rgba(255, 107, 107, 0.5);
            background: rgba(255, 107, 107, 0.05);
        }

        .player-card.opponent-side.winning {
            background: rgba(76, 206, 71, 0.15);
            border-color: rgba(76, 206, 71, 0.6);
            box-shadow: 0 0 30px rgba(76, 206, 71, 0.3);
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
            border: 3px solid rgba(0, 212, 255, 0.5);
        }

        .player-card.opponent-side .player-avatar {
            border-color: rgba(255, 107, 107, 0.5);
            background: linear-gradient(135deg, #ff6b6b, #ff8c42);
        }

        .player-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .player-rank {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
        }

        /* Task Counter */
        .tasks-display {
            text-align: center;
            margin-bottom: 15px;
        }

        .tasks-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tasks-count {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Courier New', monospace;
        }

        .player-card.opponent-side .tasks-count {
            color: #ff6b6b;
        }

        /* Animations for new tasks */
        @keyframes taskPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        .tasks-count.pulse {
            animation: taskPulse 0.5s ease;
        }

        /* Center Arena (Timer & VS) */
        .arena-center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .vs-badge {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 193, 7, 0.6);
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            width: 100%;
        }

        .timer-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffc107;
            font-family: 'Courier New', monospace;
            font-weight: 900;
        }

        .timer-display.critical {
            color: #ff6b6b;
            animation: timerPulse 1s infinite;
        }

        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Side Info */
        .match-info {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-size: 0.85rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-row:last-child {
            margin-bottom: 0;
            border-bottom: none;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .info-value {
            color: #00d4ff;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Nunito', sans-serif;
        }

        button:active {
            transform: translateY(4px);
            margin-top: 4px;
            margin-bottom: -4px;
        }

        .btn-complete {
            background: #58cc02;
            border-bottom: 4px solid #58a700;
            color: white;
        }

        .btn-complete:active {
            border-bottom-width: 0px;
        }

        .btn-quit {
            background: rgba(255, 75, 75, 0.1);
            border: 2px solid rgba(255, 75, 75, 0.5);
            border-bottom: 4px solid rgba(255, 75, 75, 0.5);
            color: #ff4b4b;
        }

        .btn-quit:active {
            border-bottom-width: 2px;
        }

        /* Win/Loss Overlay */
        .match-result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .match-result-overlay.visible {
            display: flex;
        }

        .match-result-content {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            animation: resultSlideIn 0.5s ease;
        }

        @keyframes resultSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .result-title.win {
            color: #4ece47;
        }

        .result-title.loss {
            color: #ff6b6b;
        }

        .result-subtitle {
            font-size: 1.1rem;
            color: rgba(26, 26, 46, 0.7);
            margin-bottom: 25px;
        }

        .result-stats {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: rgba(26, 26, 46, 0.7);
        }

        .stat-value {
            font-weight: 700;
            color: #00d4ff;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
        }

        .result-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .result-btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
        }

        .result-btn-secondary {
            background: rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .match-arena {
                grid-template-columns: 1fr;
            }

            .arena-center {
                order: -1;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 768px) {
            .match-arena {
                gap: 15px;
            }

            .player-card {
                padding: 20px;
            }

            .player-avatar {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }

            .player-name {
                font-size: 1.1rem;
            }

            .tasks-count {
                font-size: 2.5rem;
            }

            .timer-display {
                font-size: 1.5rem;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .match-result-content {
                margin: 20px;
                padding: 30px;
            }

            .result-title {
                font-size: 2rem;
            }

            .result-icon {
                font-size: 3.5rem;
            }
        }

        /* Streak indicator on player card */
        .player-streak {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ff8c42);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* XP reward display */
        .xp-reward-display {
            background: rgba(0, 212, 255, 0.15);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Match Header -->
        <div class="match-header">
            <div class="match-title">⚔️ LIVE MATCH</div>
            <div class="match-status-box">
                <div class="match-status-label">YOUR POSITION</div>
                <div class="leaderboard-position">#<span id="userPosition">1234</span></div>
            </div>
        </div>

        <!-- Main Arena -->
        <div class="match-arena">
            <!-- You -->
            <div class="player-card player-side" id="playerCard">
                <div class="player-streak" id="playerStreak" style="display: none;">🔥 <span id="streakValue">0</span></div>
                <div class="player-avatar">👤</div>
                <div class="player-name" id="playerName">You</div>
                <div class="player-rank" id="playerRank">Gold Rank</div>
                <div class="tasks-display">
                    <div class="tasks-label">Tasks Completed</div>
                    <div class="tasks-count" id="playerTasks">0</div>
                </div>
                <div class="xp-reward-display" id="playerXP">+0 XP</div>
            </div>

            <!-- Center (Timer & VS) -->
            <div class="arena-center">
                <div class="vs-badge">VS</div>
                <div class="timer-box">
                    <div class="timer-label">⏱️ Time Remaining</div>
                    <div class="timer-display" id="timerDisplay">23:45:30</div>
                </div>
                <div class="match-info">
                    <div class="info-row">
                        <span class="info-label">Match ID</span>
                        <span class="info-value" id="matchId">XXXX</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Lead</span>
                        <span class="info-value" id="leadDisplay">Tied</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Win XP</span>
                        <span class="info-value">+100</span>
                    </div>
                </div>
            </div>

            <!-- Opponent -->
            <div class="player-card opponent-side" id="opponentCard">
                <div class="player-streak" id="opponentStreak" style="display: none;">🔥 <span id="opponentStreakValue">0</span></div>
                <div class="player-avatar">🤖</div>
                <div class="player-name" id="opponentName">AI Opponent</div>
                <div class="player-rank" id="opponentRank">Gold Rank</div>
                <div class="tasks-display">
                    <div class="tasks-label">Tasks Completed</div>
                    <div class="tasks-count" id="opponentTasks">0</div>
                </div>
                <div class="xp-reward-display" id="opponentXP">+50 XP</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-complete" onclick="completeTask()">✅ Complete Task (+10 XP)</button>
            <button class="btn-quit" onclick="quitMatch()">❌ Forfeit Match</button>
        </div>
    </div>

    <!-- Match Result Overlay -->
    <div class="match-result-overlay" id="resultOverlay">
        <div class="match-result-content" id="resultContent">
            <!-- Filled by JavaScript -->
        </div>
    </div>

    <script src="/esports-effects.js"></script>
    <script>
        const API_BASE = '/api/esports';
        let matchData = {
            matchId: 'MATCH-001',
            player1Name: 'You',
            player1Rank: 'Gold',
            player1Tasks: 0,
            player1Streak: 3,
            player2Name: 'ShadowNinja',
            player2Rank: 'Master',
            player2Tasks: 0,
            player2Streak: 12,
            startedAt: new Date(),
            duration: 24 * 60 * 60 * 1000,
            userPosition: 1234
        };

        let timerInterval;

        /**
         * Initialize match
         */
        function initMatch() {
            updateUI();
            startTimer();
            simulateOpponentProgress();
        }

        /**
         * Update UI
         */
        function updateUI() {
            document.getElementById('playerName').textContent = matchData.player1Name;
            document.getElementById('playerRank').textContent = matchData.player1Rank + ' Rank';
            document.getElementById('playerTasks').textContent = matchData.player1Tasks;
            document.getElementById('playerXP').textContent = `+${matchData.player1Tasks * 10} XP`;

            document.getElementById('opponentName').textContent = matchData.player2Name;
            document.getElementById('opponentRank').textContent = matchData.player2Rank + ' Rank';
            document.getElementById('opponentTasks').textContent = matchData.player2Tasks;
            document.getElementById('opponentXP').textContent = `+${matchData.player2Tasks * 5} XP`;

            document.getElementById('matchId').textContent = matchData.matchId;
            document.getElementById('userPosition').textContent = matchData.userPosition;

            // Update streak display
            if (matchData.player1Streak > 1) {
                document.getElementById('playerStreak').style.display = 'block';
                document.getElementById('streakValue').textContent = matchData.player1Streak;
            }

            if (matchData.player2Streak > 1) {
                document.getElementById('opponentStreak').style.display = 'block';
                document.getElementById('opponentStreakValue').textContent = matchData.player2Streak;
            }

            // Update lead
            const diff = matchData.player1Tasks - matchData.player2Tasks;
            if (diff > 0) {
                document.getElementById('leadDisplay').textContent = `You +${diff}`;
                document.getElementById('playerCard').classList.add('winning');
                document.getElementById('opponentCard').classList.remove('winning');
            } else if (diff < 0) {
                document.getElementById('leadDisplay').textContent = `Opponent +${-diff}`;
                document.getElementById('opponentCard').classList.add('winning');
                document.getElementById('playerCard').classList.remove('winning');
            } else {
                document.getElementById('leadDisplay').textContent = 'Tied';
                document.getElementById('playerCard').classList.remove('winning');
                document.getElementById('opponentCard').classList.remove('winning');
            }
        }

        /**
         * Start timer
         */
        function startTimer() {
            timerInterval = setInterval(() => {
                const now = new Date();
                const elapsed = now - matchData.startedAt;
                const remaining = Math.max(0, matchData.duration - elapsed);

                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((remaining % (1000 * 60)) / 1000);

                const timerDisplay = document.getElementById('timerDisplay');
                timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                // Critical warning
                if (remaining < 60 * 60 * 1000) { // Last hour
                    timerDisplay.classList.add('critical');
                }

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    endMatch('time_up');
                }
            }, 1000);
        }

        /**
         * Complete task
         */
        function completeTask() {
            matchData.player1Tasks++;
            
            const taskCount = document.getElementById('playerTasks');
            
            // Effects
            if (window.esportsEffects) {
                esportsEffects.taskCompletionEffect(taskCount);
                esportsEffects.xpGainEffect(10, taskCount);
                
                // Check if player is now winning
                if (matchData.player1Tasks > matchData.player2Tasks) {
                    esportsEffects.winningCardAnimation(document.getElementById('playerCard'));
                    esportsEffects.playSound('timing_good', 0.15);
                }
            }

            taskCount.classList.add('pulse');
            setTimeout(() => taskCount.classList.remove('pulse'), 500);

            updateUI();
        }

        /**
         * Quit match
         */
        function quitMatch() {
            if (confirm('Are you sure? You will forfeit the match.')) {
                endMatch('forfeit');
            }
        }

        /**
         * Simulate opponent progress
         */
        function simulateOpponentProgress() {
            setInterval(() => {
                if (Math.random() > 0.7) {
                    matchData.player2Tasks++;
                    
                    // Effects
                    if (window.esportsEffects) {
                        const opponentTaskCount = document.getElementById('opponentTasks');
                        esportsEffects.opponentTaskEffect(matchData.player2Tasks);
                        
                        // Check if opponent takes lead
                        if (matchData.player2Tasks > matchData.player1Tasks) {
                            esportsEffects.winningCardAnimation(document.getElementById('opponentCard'));
                        }
                    }
                    
                    updateUI();
                }
            }, 3000 + Math.random() * 5000);
        }

        /**
         * End match
         */
        function endMatch(reason = 'completed') {
            clearInterval(timerInterval);

            const playerWon = matchData.player1Tasks > matchData.player2Tasks;
            const xpReward = playerWon ? 100 : 50;

            const overlay = document.getElementById('resultOverlay');
            const content = document.getElementById('resultContent');

            // Effects
            if (window.esportsEffects) {
                if (playerWon) {
                    esportsEffects.victoryEffect();
                } else {
                    esportsEffects.defeatEffect();
                    esportsEffects.playSound('defeat', 0.4);
                }
            }

            if (playerWon) {
                document.body.classList.add('match-won');
                content.innerHTML = `
                    <div class="result-icon">🏆</div>
                    <div class="result-title win">VICTORY!</div>
                    <div class="result-subtitle">You defeated ${matchData.player2Name}</div>
                    <div class="result-stats">
                        <div class="stat-row">
                            <span class="stat-label">Your Tasks</span>
                            <span class="stat-value">${matchData.player1Tasks}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Opponent Tasks</span>
                            <span class="stat-value">${matchData.player2Tasks}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">XP Earned</span>
                            <span class="stat-value">+${xpReward}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Streak</span>
                            <span class="stat-value">${matchData.player1Streak}x</span>
                        </div>
                    </div>
                    <div class="result-buttons">
                        <button class="result-btn result-btn-primary" onclick="location.href='/esports-leaderboard.html'">View Leaderboard</button>
                        <button class="result-btn result-btn-secondary" onclick="location.href='/esports-dashboard.html'">Back to Dashboard</button>
                    </div>
                `;
            } else {
                document.body.classList.add('match-lost');
                content.innerHTML = `
                    <div class="result-icon">😔</div>
                    <div class="result-title loss">DEFEAT</div>
                    <div class="result-subtitle">${matchData.player2Name} won this round</div>
                    <div class="result-stats">
                        <div class="stat-row">
                            <span class="stat-label">Your Tasks</span>
                            <span class="stat-value">${matchData.player1Tasks}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Opponent Tasks</span>
                            <span class="stat-value">${matchData.player2Tasks}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">XP Earned</span>
                            <span class="stat-value">+${xpReward}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Streak Reset</span>
                            <span class="stat-value">Restart Now</span>
                        </div>
                    </div>
                    <div class="result-buttons">
                        <button class="result-btn result-btn-primary" onclick="location.href='/esports-leaderboard.html'">Try Again</button>
                        <button class="result-btn result-btn-secondary" onclick="location.href='/esports-dashboard.html'">Back to Dashboard</button>
                    </div>
                `;
            }

            overlay.classList.add('visible');
        }

        // Initialize on load
        window.addEventListener('load', initMatch);
    </script>
</body>
</html>
